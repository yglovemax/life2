<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nexa AI API Admin</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">N</span>
        <div>
          <strong>Nexa Admin</strong>
          <small>AI API 控制台</small>
        </div>
      </div>
      <nav>
        <button class="active" data-view="modules">模块中心</button>
        <button data-view="test-center">测试中心</button>
        <button>知识库</button>
        <button>成本中心</button>
        <button>发布中心</button>
        <button>安全审计</button>
      </nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p>Phase 1 Console</p>
          <h1>AI API 管理后台</h1>
        </div>
        <div class="status-pill">星座 / 占星一期</div>
      </header>

      <section class="metrics" id="metrics"></section>

      <section class="layout" id="moduleView">
        <section class="panel module-center">
          <div class="panel-head">
            <div>
              <p>Module Center</p>
              <h2>模块中心</h2>
            </div>
            <div class="toolbar">
              <select id="pageFilter">
                <option value="">全部页面</option>
              </select>
              <button class="primary compact" id="createModuleButton">新增模块</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>模块</th>
                  <th>页面</th>
                  <th>负责人</th>
                  <th>模型</th>
                  <th>状态</th>
                  <th>调用</th>
                  <th>Fallback</th>
                </tr>
              </thead>
              <tbody id="moduleRows"></tbody>
            </table>
          </div>
        </section>

        <section class="panel detail" id="detailPanel">
          <div class="empty">选择一个模块查看 Prompt、字段契约和调用追踪。</div>
        </section>
      </section>

      <section class="layout hidden" id="testCenterView">
        <section class="panel module-center">
          <div class="panel-head">
            <div>
              <p>Test Center</p>
              <h2>测试中心</h2>
            </div>
            <button class="primary compact" id="runBatchButton">批量测试</button>
          </div>
          <div class="detail-body">
            <div class="form-grid">
              <label>页面
                <select id="testPage"></select>
              </label>
              <label>模型
                <select id="testModel"></select>
              </label>
              <label>测试用户
                <select id="testUser"></select>
              </label>
              <label>日期
                <input id="testDate" type="date" />
              </label>
              <label class="wide">测试输入 JSON
                <textarea id="testPayload"></textarea>
              </label>
            </div>
            <section class="section">
              <div class="panel-head inline-head">
                <div><p>Modules</p><h3>选择测试模块</h3></div>
                <button class="secondary compact" id="runSingleButton">单模块测试</button>
              </div>
              <div class="module-checks" id="testModuleChecks"></div>
            </section>
          </div>
        </section>

        <section class="panel detail">
          <div class="panel-head">
            <div>
              <p>Outputs</p>
              <h2>结果与评分</h2>
            </div>
            <button class="secondary compact" id="refreshTracesButton">刷新</button>
          </div>
          <div class="detail-body">
            <div id="testNotice"></div>
            <section>
              <h3>本次结果</h3>
              <div id="testResults" class="trace-list"><p class="empty">还没有测试结果。</p></div>
            </section>
            <section class="section">
              <h3>最近调用记录</h3>
              <div id="recentTraceList" class="trace-list"></div>
            </section>
          </div>
        </section>
      </section>
    </main>
    <script src="/static/admin.js"></script>
  </body>
</html>
